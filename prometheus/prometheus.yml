global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # GPU metrics: utilization, VRAM used/free, temperature, power per GPU
  - job_name: gpu
    static_configs:
      - targets: ['dcgm-exporter:9400']

  # LiteLLM metrics: request latency, token counts, error rates per model
  - job_name: litellm
    static_configs:
      - targets: ['litellm:4000']
    metrics_path: /metrics
    authorization:
      credentials_file: /etc/prometheus/litellm_token

  # Prometheus self-monitoring
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
