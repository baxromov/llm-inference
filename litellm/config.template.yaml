# ── LITELLM SETTINGS ─────────────────────────────────────────────────────────
# Edit this file to change LiteLLM proxy behavior.
# DO NOT edit litellm/config.yaml — it is auto-generated from models.yaml.
# Run: ./deploy.sh render   to regenerate config.yaml from this template + models.yaml
# ─────────────────────────────────────────────────────────────────────────────

litellm_settings:
  num_retries: 2
  request_timeout: 300
  drop_params: true
  cache: false

general_settings:
  master_key: "os.environ/LITELLM_MASTER_KEY"
  store_model_in_db: true
  disable_error_logs: false
  user_url_allowed_hosts:
    - "172.31.174.11"
    - "172.31.174.11:8123"

router_settings:
  routing_strategy: simple-shuffle
  num_retries: 2
  retry_after: 5
