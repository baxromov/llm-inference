litellm_settings:
  num_retries: 2
  request_timeout: 300
  drop_params: true
  cache: false

general_settings:
  master_key: "os.environ/LITELLM_MASTER_KEY"
  store_model_in_db: false
  disable_error_logs: false
  user_url_allowed_hosts:
