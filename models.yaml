# ─────────────────────────────────────────────────────────────────────────────
# models.yaml — Chat models for the LLM stack
#
# This file drives two downstream configs (auto-generated — do not edit them):
#   litellm/config.yaml      ← LiteLLM API gateway model list
#   ollama/init-models.sh    ← which models Ollama pulls on first start
#
# To add / remove a model:
#   1. Edit this file
#   2. Run:  ./deploy.sh render          (just re-render, no restart)
#      or:   ./manage.sh apply-models    (re-render + restart litellm)
# ─────────────────────────────────────────────────────────────────────────────

# ── Chat / Completion models (served by Ollama) ──────────────────────────────
chat:
  - name: qwen3.6-27b
    ollama_model: qwen3.6:27b          # model tag used with `ollama pull`
    description: "Qwen 3.6 27B — 17 GB VRAM, 256K context, text + vision"
    timeout: 300
    stream_timeout: 300
    aliases: []

  - name: gpt-oss-120b
    ollama_model: gpt-oss:120b
    description: "GPT-OSS 120B"
    timeout: 600
    stream_timeout: 600
    aliases: []

  - name: gemma4-31b
    ollama_model: gemma4:31b
    description: "Gemma 4 31B"
    timeout: 600
    stream_timeout: 600
    aliases: []

  # ── To add another chat model, copy this block and uncomment:
