# ─────────────────────────────────────────────────────────────────────────────
# LLM Inference Stack — LiteLLM proxy (Ollama runs natively on the host)
#
# Architecture:
#   Ollama  → systemd service on host  (direct GPU, no container injection)
#   LiteLLM → Docker container         (connects to host Ollama via host.docker.internal)
#
# Host requirements:
#   - Ollama installed + running  (./deploy.sh handles this automatically)
#   - NVIDIA driver + nvidia-smi  (for GPU access)
#
# Exposed ports:
#   8080  → LiteLLM API  +  /ui dashboard
#
# Run:  ./deploy.sh
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ── POSTGRES ── Required for LiteLLM UI login and user management ──────────
  postgres:
    image: postgres:16-alpine
    container_name: litellm-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=litellm
      - POSTGRES_USER=litellm
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm -d litellm"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "2"

  # ── LITELLM PROXY ── OpenAI-compatible API gateway + built-in UI ──────────
  # config.yaml is auto-generated from models.yaml — run ./deploy.sh render
  litellm:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: litellm
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
    environment:
      - LITELLM_CONFIG_PATH=/app/config.yaml
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
      - UI_USERNAME=${LITELLM_UI_USERNAME}
      - UI_PASSWORD=${LITELLM_UI_PASSWORD}
      - LITELLM_TELEMETRY=false
      - DATABASE_URL=postgresql://litellm:${POSTGRES_PASSWORD}@postgres:5432/litellm
      - STORE_MODEL_IN_DB=True
    command:
      ["--config", "/app/config.yaml", "--port", "8080", "--num_workers", "1"]
    ports:
      - "8080:8080"
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "3"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python3 -c ''import urllib.request; urllib.request.urlopen("http://localhost:8080/")''',
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  postgres_data:
